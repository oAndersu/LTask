<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Passatempo</title>
	<link rel="stylesheet" href="seila.css">
	
</head>
<body>
		<input type="text" id="input">
		<button id="botao"> Confirmar</button>
		<ol id="lista">
			
		</ol>		


	<script>
	//Variaveis iniciais
	let tarefas = []
	const input =  document.getElementById('input')
	const lista = document.getElementById('lista')
	const botao = document.getElementById('botao')

	//Salvamento
	const tarefasalva = JSON.parse(localStorage.getItem("tarefas"))
	if (tarefasalva) {
		tarefas = tarefasalva
		tarefasalva.forEach(function (texto) {
		const sli =	document.createElement('li')
		const sx =	document.createElement('button')

            sli.textContent = texto
			sx.textContent = 'x'
			sli.appendChild(sx)
			lista.appendChild(sli)

		sx.addEventListener("click", function (){
			event.stopPropagation()
			sli.remove()

			tarefas = tarefas.filter(function(t) {
				return t != texto



			})
			localStorage.setItem("tarefas", JSON.stringify(tarefas))
		})
		sli.addEventListener("click", function (){
			if (sli.style.textDecoration != "line-through") {
				sli.style.textDecoration = "line-through"
			}
			else{
				sli.style.textDecoration = ""
			}
		})
		})

	}

	// Botão e seu funcionamento 
	botao.addEventListener("click", function(){
	   const texto = input.value 
	   const item = document.createElement('li')
	   const x = document.createElement('button')
       
   //Condições
	if(texto !="") {

		//monta a tarefa
       x.textContent = 'x'
       item.textContent = texto
       item.appendChild(x)
	   lista.appendChild(item)
	   input.value = ""
       tarefas.push(texto)

		//Botão para excluir
	   x.addEventListener("click", function(){
		   event.stopPropagation()
		   item.remove()
		   tarefas = tarefas.filter(function(t) {
			   return t != texto
		   })
		   localStorage.setItem("tarefas", JSON.stringify(tarefas))
	})
		// Botão de conclusão
		item.addEventListener("click", function (){
			if (item.style.textDecoration !="line-through" ) {
				 item.style.textDecoration = "line-through"

			}
			else{
				 item.style.textDecoration = ""
			}
		})

		// Storage
		localStorage.setItem("tarefas", JSON.stringify(tarefas))
	}
	})
	</script>
</body>
</html>
